<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exposiciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
    <nav class="navbar">
        <div class="container"
            style="padding-top:0;padding-bottom:0;display:flex;align-items:center;justify-content:space-between;">
            <a class="navbar-brand" href="/web">Museo</a>
            <ul style="list-style:none;display:flex;gap:0.25rem;margin:0;padding:0;">
                <li><a class="nav-link active" href="/web/exposiciones">Exposiciones</a></li>
                <li><a class="nav-link" href="/web/obras">Obras</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">

        <div class="page-header">
            <h1 class="page-title">Exposiciones</h1>
            <a class="btn btn-primary" href="/web/exposiciones/nueva">+ Nueva exposición</a>
        </div>

        <!-- Formulario de filtros -->
        <form method="get" action="/web/exposiciones" class="filter-panel">
            <div class="filter-row">
                <div class="filter-field">
                    <label class="form-label">Título</label>
                    <input type="text" name="titulo" class="form-control" placeholder="Ej: Impresionismo"
                        th:value="${titulo}" /> <!-- de guia al usuario -->
                </div>
                <div class="filter-field">
                    <label class="form-label">Ciudad</label>
                    <input type="text" name="ciudad" class="form-control" placeholder="Ej: Madrid"
                        th:value="${ciudad}" /> <!-- de guia al usuario -->
                </div>
                <div class="filter-field">
                    <label class="form-label">Activas en fecha</label>
                    <input type="date" name="fecha" class="form-control" th:value="${fecha}" />
                </div>
                <div class="filter-actions">
                    <button type="submit" class="btn btn-primary">Filtrar</button>
                    <a href="/web/exposiciones" class="btn btn-secondary">Limpiar</a>
                </div>
            </div>
        </form>

        <div th:if="${#lists.isEmpty(exposiciones)}" class="alert alert-info">
            No hay exposiciones que coincidan con los filtros :(...
        </div>

        <div th:if="${!#lists.isEmpty(exposiciones)}">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Título</th>
                        <th>Ciudad</th>
                        <th>Inicio</th>
                        <th>Fin</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="exposicion : ${exposiciones}">
                        <td th:text="${exposicion.titulo}"></td>
                        <td th:text="${exposicion.ciudad}"></td>
                        <td th:text="${exposicion.fechaInicio}"></td>
                        <td th:text="${exposicion.fechaFin}"></td>
                        <td>
                            <div class="td-actions">
                                <a th:href="@{'/web/exposiciones/' + ${exposicion.id}}"
                                    class="btn btn-sm btn-ver">Ver</a>
                                <a th:href="@{'/web/exposiciones/editar/' + ${exposicion.id}}"
                                    class="btn btn-sm btn-enviar">Editar</a>
                                <form th:action="@{'/web/exposiciones/borrar/' + ${exposicion.id}}" method="post">
                                    <button type="submit" class="btn btn-sm btn-eliminar"
                                        onclick="return confirm('¿Eliminar esta exposición?');">Eliminar</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</body>

</html>
