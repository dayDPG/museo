<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${exposicion.titulo} + ' — Museo'"></title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <nav class="navbar">
        <div class="navbar-inner">
            <a class="navbar-brand" href="/web">Museo</a>
            <ul class="navbar-links">
                <li><a class="nav-link active" href="/web/exposiciones">Exposiciones</a></li>
                <li><a class="nav-link" href="/web/obras">Obras</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">

        <div class="page-header">
            <h1 class="page-title" th:text="${exposicion.titulo}"></h1>
            <div class="detail-actions">
                <a th:href="@{'/web/exposiciones/editar/' + ${exposicion.id}}" class="btn btn-enviar">Editar</a>
                <form th:action="@{'/web/exposiciones/borrar/' + ${exposicion.id}}" method="post">
                    <button type="submit" class="btn btn-eliminar"
                        onclick="return confirm('¿Eliminar esta exposición?');">Eliminar</button>
                </form>
                <a href="/web/exposiciones" class="btn btn-secondary">Volver</a>
            </div>
        </div>

        <div class="card">
            <div class="detail-grid">
                <div class="detail-item">
                    <span class="detail-label">Ciudad</span>
                    <span class="detail-value" th:text="${exposicion.ciudad}"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Fecha de inicio</span>
                    <span class="detail-value" th:text="${exposicion.fechaInicio}"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Fecha de fin</span>
                    <span class="detail-value" th:text="${exposicion.fechaFin}"></span>
                </div>
            </div>
        </div>

        <h2 class="section-title">Obras en esta exposición</h2>

        <div th:if="${#lists.isEmpty(obras)}" class="alert alert-info">
            No hay obras en esta exposición...
        </div>

        <div th:if="${!#lists.isEmpty(obras)}">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Título</th>
                        <th>Autor</th>
                        <th>Año</th>
                        <th>Técnica</th>
                        <th>Valor (€)</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="obra : ${obras}">
                        <td th:text="${obra.titulo}"></td>
                        <td th:text="${obra.autor}"></td>
                        <td th:text="${obra.añoCreacion}"></td>
                        <td th:text="${obra.tecnica}"></td>
                        <td th:text="'€ ' + ${obra.valorEuros}"></td>
                        <td>
                            <div class="td-actions">
                                <a th:href="@{'/web/obras/editar/' + ${obra.id}}"
                                    class="btn btn-sm btn-enviar">Editar</a>
                                <form th:action="@{'/web/obras/borrar/' + ${obra.id}}" method="post">
                                    <button type="submit" class="btn btn-sm btn-eliminar"
                                        onclick="return confirm('¿Eliminar esta obra?');">Eliminar</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="total-panel">
            <span class="total-label">Valor total de las obras</span>
            <span class="total-value" th:text="'€ ' + ${valorTotal}"></span>
        </div>

    </div>
</body>

</html>
