<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${exposicion.titulo}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/web">Museo</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="/web/exposiciones">Exposiciones</a></li>
                <li class="nav-item"><a class="nav-link" href="/web/obras">Obras</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 th:text="${exposicion.titulo}"></h1>
        <div>
            <a th:href="@{'/web/exposiciones/editar/' + ${exposicion.id}}" class="btn btn-warning">Editar</a>
            <form th:action="@{'/web/exposiciones/borrar/' + ${exposicion.id}}" method="post" class="d-inline">
                <button type="submit" class="btn btn-danger" onclick="return confirm('¿Eliminar esta exposición?');">Eliminar</button>
            </form>
            <a href="/web/exposiciones" class="btn btn-secondary">Volver</a>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <p><strong>Ciudad:</strong> <span th:text="${exposicion.ciudad}"></span></p>
                </div>
                <div class="col-md-6">
                    <p><strong>Fecha de inicio:</strong> <span th:text="${exposicion.fechaInicio}"></span></p>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <p><strong>Fecha de fin:</strong> <span th:text="${exposicion.fechaFin}"></span></p>
                </div>
            </div>
        </div>
    </div>

    <h2>Obras en esta exposición</h2>
    
    <div th:if="${#lists.isEmpty(obras)}" class="alert alert-info">
        No hay obras en esta exposición.
    </div>

    <div th:if="${!#lists.isEmpty(obras)}">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Título</th>
                    <th>Autor</th>
                    <th>Año</th>
                    <th>Técnica</th>
                    <th>Valor (€)</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="obra : ${obras}">
                    <td th:text="${obra.titulo}"></td>
                    <td th:text="${obra.autor}"></td>
                    <td th:text="${obra.añoCreacion}"></td>
                    <td th:text="${obra.tecnica}"></td>
                    <td th:text="'€ ' + ${obra.valorEuros}"></td>
                    <td>
                        <a th:href="@{'/web/obras/editar/' + ${obra.id}}" class="btn btn-sm btn-warning">Editar</a>
                        <form th:action="@{'/web/obras/borrar/' + ${obra.id}}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar esta obra?');">Eliminar</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="card mt-4 bg-light">
        <div class="card-body">
            <h5 class="card-title">Valor total de obras</h5>
            <p class="card-text"><strong th:text="'€ ' + ${valorTotal}"></strong></p>
        </div>
    </div>

    <div class="mt-4">
        <a href="/web/exposiciones" class="btn btn-secondary">Volver a exposiciones</a>
    </div>
</div>
</body>
</html>
