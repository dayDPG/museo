<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario exposición — Museo</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <nav class="navbar">
        <div class="container"
            style="padding-top:0;padding-bottom:0;display:flex;align-items:center;justify-content:space-between;">
            <a class="navbar-brand" href="/web">Museo</a>
            <ul style="list-style:none;display:flex;gap:0.25rem;margin:0;padding:0;">
                <li><a class="nav-link active" href="/web/exposiciones">Exposiciones</a></li>
                <li><a class="nav-link" href="/web/obras">Obras</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">

        <div class="page-header">
            <h1 class="page-title" th:text="${exposicion.id} != null ? 'Editar exposición' : 'Nueva exposición'"></h1>
        </div>

        <div class="form-card">
            <form th:action="${actionUrl}" th:object="${exposicion}" method="post">
                <input type="hidden" th:field="*{id}" />

                <div class="form-group">
                    <label class="form-label">Título</label>
                    <input type="text" class="form-control" th:field="*{titulo}" required />
                </div>

                <div class="form-group">
                    <label class="form-label">Ciudad</label>
                    <input type="text" class="form-control" th:field="*{ciudad}" required />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Fecha de inicio</label>
                        <input type="date" class="form-control" th:field="*{fechaInicio}" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Fecha de fin</label>
                        <input type="date" class="form-control" th:field="*{fechaFin}" />
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <a href="/web/exposiciones" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>

    </div>
</body>

</html>
