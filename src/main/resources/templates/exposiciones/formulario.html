<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Exposición</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/web">Museo</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/web/exposiciones">Exposiciones</a></li>
                <li class="nav-item"><a class="nav-link" href="/web/obras">Obras</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h1 th:text="${exposicion.id} != null ? 'Editar exposición' : 'Nueva exposición'"></h1>

    <form th:action="${actionUrl}" th:object="${exposicion}" method="post">
        <input type="hidden" th:field="*{id}" />
        <div class="mb-3">
            <label class="form-label">Título</label>
            <input type="text" class="form-control" th:field="*{titulo}" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Ciudad</label>
            <input type="text" class="form-control" th:field="*{ciudad}" required />
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Fecha inicio</label>
                <input type="date" class="form-control" th:field="*{fechaInicio}" />
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Fecha fin</label>
                <input type="date" class="form-control" th:field="*{fechaFin}" />
            </div>
        </div>
        <div class="mb-3">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="/web/exposiciones" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
</body>
</html>
