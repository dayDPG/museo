<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario obra — Museo</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <nav class="navbar">
        <div class="navbar-inner">
            <a class="navbar-brand" href="/web">Museo</a>
            <ul class="navbar-links">
                <li><a class="nav-link" href="/web/exposiciones">Exposiciones</a></li>
                <li><a class="nav-link active" href="/web/obras">Obras</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">

        <div class="page-header">
            <h1 class="page-title" th:text="${obra.id} != null ? 'Editar obra' : 'Nueva obra'"></h1>
        </div>

        <div class="form-card">
            <form th:action="${actionUrl}" th:object="${obra}" method="post">
                <input type="hidden" th:field="*{id}" />

                <div class="form-group">
                    <label class="form-label">Título</label>
                    <input type="text" class="form-control" th:field="*{titulo}" required />
                </div>

                <div class="form-group">
                    <label class="form-label">Autor</label>
                    <input type="text" class="form-control" th:field="*{autor}" required />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Año de creación</label>
                        <input type="text" class="form-control" th:field="*{añoCreacion}" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Técnica</label>
                        <input type="text" class="form-control" th:field="*{tecnica}" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Valor (€)</label>
                        <input type="number" class="form-control" th:field="*{valorEuros}" />
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Exposición</label>
                    <select class="form-select" th:field="*{exposicion}">
                        <option value="">— Sin exposición —</option>
                        <option th:each="exp : ${exposiciones}" th:value="${exp.id}" th:text="${exp.titulo}"></option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <a href="/web/obras" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>

    </div>
</body>

</html>
