<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Obra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/web">Museo</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/web/exposiciones">Exposiciones</a></li>
                <li class="nav-item"><a class="nav-link active" href="/web/obras">Obras</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h1 th:text="${obra.id} != null ? 'Editar obra' : 'Nueva obra'"></h1>

    <form th:action="${actionUrl}" th:object="${obra}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label">Título</label>
            <input type="text" class="form-control" th:field="*{titulo}" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Autor</label>
            <input type="text" class="form-control" th:field="*{autor}" required />
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label">Año de creación</label>
                <input type="text" class="form-control" th:field="*{añoCreacion}" />
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">Técnica</label>
                <input type="text" class="form-control" th:field="*{tecnica}" />
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">Valor (€)</label>
                <input type="number" class="form-control" th:field="*{valorEuros}" />
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Exposición</label>
            <select class="form-select" name="exposicion">
                <option value="" disabled="disabled" th:selected="${obra.exposicion == null}">-- Seleccione --</option>
                <option th:each="exp : ${exposiciones}" th:value="${exp.id}" th:text="${exp.titulo}"
                        th:selected="${obra.exposicion != null and obra.exposicion.id == exp.id}"></option>
            </select>
        </div>

        <div class="mb-3">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="/web/obras" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
</body>
</html>
