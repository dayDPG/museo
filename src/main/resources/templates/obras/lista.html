<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obras — Museo</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <nav class="navbar">
        <div class="navbar-inner">
            <a class="navbar-brand" href="/web">Museo</a>
            <ul class="navbar-links">
                <li><a class="nav-link" href="/web/exposiciones">Exposiciones</a></li>
                <li><a class="nav-link active" href="/web/obras">Obras</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">

        <div class="page-header">
            <h1 class="page-title">Obras</h1>
            <a class="btn btn-primary" href="/web/obras/nueva">+ Nueva obra</a>
        </div>

        <form method="get" action="/web/obras" class="filter-panel">
            <div class="filter-row">
                <div class="filter-field">
                    <label class="form-label">Título</label>
                    <input type="text" name="titulo" class="form-control" placeholder="Ej: La Gioconda"
                        th:value="${titulo}" />
                </div>
                <div class="filter-field">
                    <label class="form-label">Autor</label>
                    <input type="text" name="autor" class="form-control" placeholder="Ej: Da Vinci"
                        th:value="${autor}" />
                </div>
                <div class="filter-field">
                    <label class="form-label">Técnica</label>
                    <input type="text" name="tecnica" class="form-control" placeholder="Ej: Óleo, Escultura…"
                        th:value="${tecnica}" />
                </div>
                <div class="filter-actions">
                    <button type="submit" class="btn btn-primary">Filtrar</button>
                    <a href="/web/obras" class="btn btn-secondary">Limpiar</a>
                </div>
            </div>
        </form>

        <div th:if="${#lists.isEmpty(obras)}" class="alert alert-info">
            No hay obras que coincidan con los filtros :(...
        </div>

        <div th:if="${!#lists.isEmpty(obras)}">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Título</th>
                        <th>Autor</th>
                        <th>Técnica</th>
                        <th>Exposición</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="obra : ${obras}">
                        <td th:text="${obra.titulo}"></td>
                        <td th:text="${obra.autor}"></td>
                        <td th:text="${obra.tecnica}"></td>
                        <td th:text="${obra.exposicion != null ? obra.exposicion.titulo : 'Sin exposición'}"></td>
                        <td>
                            <div class="td-actions">
                                <a th:href="@{'/web/obras/editar/' + ${obra.id}}"
                                    class="btn btn-sm btn-enviar">Editar</a>
                                <form th:action="@{'/web/obras/borrar/' + ${obra.id}}" method="post">
                                    <button type="submit" class="btn btn-sm btn-eliminar"
                                        onclick="return confirm('¿Eliminar esta obra?');">Eliminar</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</body>

</html>
