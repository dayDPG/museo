spring.application.name=museo
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/museo_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:museo_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:museo_pass}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
