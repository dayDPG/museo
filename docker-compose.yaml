version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: museo_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: museo_db
      MYSQL_USER: museo_user
      MYSQL_PASSWORD: museo_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: museo_app
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/museo_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: museo_user
      SPRING_DATASOURCE_PASSWORD: museo_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    volumes:
      - .:/workspace:cached

volumes:
  mysql_data: